# ---------------------------------------------------------------------------
# Local-dev wrapper around the single-container HuggingFace Spaces image.
#
# Same image you push to the Space: FastAPI serves both the API and the built
# React SPA on one origin, with SQLite persistence on a named volume that
# emulates the HF Storage Bucket mount at /data. No MongoDB.
#
# Override MUSCLE_HOST_PORT via .env (or shell) if 7860 conflicts; the
# in-container port is fixed at 7860 to mirror HF Spaces.
# ---------------------------------------------------------------------------

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: muscle-growth-panel:dev
    ports:
      - "${MUSCLE_HOST_PORT:-7860}:7860"
    environment:
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-CHANGEME-by-overriding-in-dot-env-file}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      VLLM_API_KEY: ${VLLM_API_KEY:-}
      VLLM_API_USERNAME: ${VLLM_API_USERNAME:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      CONFIG_PATH: ${CONFIG_PATH:-/home/user/app/muscle_growth_config.yaml}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      DATA_DIR: /data
    volumes:
      - muscle_growth_data:/data

volumes:
  muscle_growth_data:
